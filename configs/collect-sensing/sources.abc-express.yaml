        SELECT id::text AS pos_id,
               id::text AS shipment_ref,
               COALESCE(no_ttk, id::text) AS no_ttk,
               COALESCE(no_ttk, id::text) AS display_name,
               COALESCE(status, 'unknown') AS status,
               total_weight AS chargeable_weight
        FROM pos
        ORDER BY id
        LIMIT 500
      recordIdColumn: pos_id
    normalize:
      ontologyId: foundation
      entityType: TTK
      mapping:
