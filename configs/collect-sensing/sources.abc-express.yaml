# ABC Express shadow ingest — logistics-commercial on foundation ontology.
# Set DAEMON_ABC_FIXTURES=1 to enable abc-fixture-* sources at runtime (CI / local parity).
# Set DAEMON_ABC_LIVE_INGEST=1 and ANTERO_SUPABASE_DB_URL to enable abc-antero-* live shadow sources.
sources:
  - id: abc-fixture-shipments
    enabled: false
    scope:
      tenantId: abc-antero
      domainId: logistics
    connector:
      type: file
      format: jsonl
      path: tests/fixtures/abc-express/shipments.jsonl
    normalize:
      ontologyId: foundation
      entityType: Shipment
      mapping:
        shipment_id: externalRef
        name: displayName
        status: status
        order_ref: orderRef
        no_ttk: noTtk
        chargeable_weight: chargeableWeight
      idField: externalRef
      meta:
        source: abc-fixture-shipments
        pack: logistics-commercial

  - id: abc-fixture-manifests
    enabled: false
    scope:
