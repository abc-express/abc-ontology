  - id: abc-antero-customer
    enabled: false
    scope:
      tenantId: abc-antero
      domainId: logistics
    connector:
      type: postgres-read
      connectionEnv: ANTERO_SUPABASE_DB_URL
      sql: |
        SELECT id::text AS customer_id,
               COALESCE(name, customer_code, id::text) AS name,
               COALESCE(status, 'active') AS status
        FROM customer
        ORDER BY id
        LIMIT 500
    normalize:
      ontologyId: foundation
      entityType: Account
      mapping:
        customer_id: externalRef
        name: displayName
        status: status
      idField: externalRef
      meta:
        source: abc-antero-customer
        pack: logistics-commercial

