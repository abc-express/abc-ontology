name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run spec:check
      - run: pnpm run build
      - run: pnpm run test
      - run: pnpm run test:repo

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go work sync
      - run: go test ./collect-sensing/... ./security-governance/authn/... ./toolchain/sdk/go/... -count=1

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --workspace

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daemon
          POSTGRES_PASSWORD: daemon
          POSTGRES_DB: daemon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daemon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Repo integration tests
        env:
          DAEMON_POSTGRES_URL: postgresql://daemon:daemon@localhost:5432/daemon
          DAEMON_REDIS_URL: redis://localhost:6379
          DAEMON_INTEGRATION_REQUIRED: "1"
        run: pnpm run test:repo
